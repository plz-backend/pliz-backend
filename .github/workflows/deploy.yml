name: Deploy backend

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}
      IMAGE_NAME: pliz-backend
      RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ secrets.DEPLOYER_SERVICE_ACCOUNT }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print deployment context
        run: |
          echo "github.repository=${{ github.repository }}"
          echo "github.ref_name=${{ github.ref_name }}"
          echo "PROJECT_ID=$PROJECT_ID"
          echo "REGION=$REGION"
          echo "GAR_REPOSITORY=$GAR_REPOSITORY"
          echo "SERVICE_NAME=$SERVICE_NAME"
          echo "RUNTIME_SERVICE_ACCOUNT=$RUNTIME_SERVICE_ACCOUNT"
          echo "DEPLOYER_SERVICE_ACCOUNT=$DEPLOYER_SERVICE_ACCOUNT"
          echo "WORKLOAD_IDENTITY_PROVIDER=$WORKLOAD_IDENTITY_PROVIDER"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build image
        run: |
          docker build \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: >-
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --port=8080
            --allow-unauthenticated
            --set-secrets=DATABASE_URL=DATABASE_URL:latest
            --set-secrets=DIRECT_URL=DIRECT_URL:latest
            --set-secrets=REDIS_URL=REDIS_URL:latest
            --set-secrets=REDIS_HOST=REDIS_HOST:latest
            --set-secrets=REDIS_PORT=REDIS_PORT:latest
            --set-secrets=REDIS_PASSWORD=REDIS_PASSWORD:latest
            --set-secrets=REDIS_TLS=REDIS_TLS:latest
            --set-secrets=BASE_URL=BASE_URL:latest
            --set-secrets=FRONTEND_URL=FRONTEND_URL:latest
            --set-secrets=ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest
            --set-secrets=EMAIL_HOST=EMAIL_HOST:latest
            --set-secrets=EMAIL_USER=EMAIL_USER:latest
            --set-secrets=EMAIL_PASSWORD=EMAIL_PASSWORD:latest
            --set-secrets=EMAIL_FROM=EMAIL_FROM:latest
            --set-secrets=EMAIL_PORT=EMAIL_PORT:latest
            --set-secrets=EMAIL_TOKEN_EXPIRY_HOURS=EMAIL_TOKEN_EXPIRY_HOURS:latest
            --set-secrets=CACHE_EMAIL_TOKEN_TTL=CACHE_EMAIL_TOKEN_TTL:latest
            --set-secrets=CACHE_COUNTRIES_TTL=CACHE_COUNTRIES_TTL:latest
            --set-secrets=CACHE_OTP_TTL=CACHE_OTP_TTL:latest
            --set-secrets=CACHE_USER_SESSION_TTL=CACHE_USER_SESSION_TTL:latest
            --set-secrets=RATE_LIMIT_MAX_REQUESTS=RATE_LIMIT_MAX_REQUESTS:latest
            --set-secrets=RATE_LIMIT_WINDOW_MS=RATE_LIMIT_WINDOW_MS:latest
            --set-secrets=FLW_SECRET_KEY=FLW_SECRET_KEY:latest
            --set-secrets=FLW_WEBHOOK_HASH=FLW_WEBHOOK_HASH:latest
            --set-secrets=FLW_PUBLIC_KEY=FLW_PUBLIC_KEY:latest
            --set-secrets=JWT_SECRET=JWT_SECRET:latest
            --set-secrets=JWT_ACCESS_EXPIRATION=JWT_ACCESS_EXPIRATION:latest
            --set-secrets=JWT_REFRESH_EXPIRATION=JWT_REFRESH_EXPIRATION:latest
            --set-secrets=PREMBLY_API_KEY=PREMBLY_API_KEY:latest
            --set-secrets=PREMBLY_APP_ID=PREMBLY_APP_ID:latest
            --set-secrets=SENDCHAMP_API_KEY=SENDCHAMP_API_KEY:latest
            --set-secrets=SENDCHAMP_SMS_SENDER=SENDCHAMP_SMS_SENDER:latest
            --set-secrets=SENDCHAMP_WHATSAPP_SENDER=SENDCHAMP_WHATSAPP_SENDER:latest
            --set-secrets=OTP_CHANNEL=OTP_CHANNEL:latest
            --set-secrets=TERMII_API_KEY=TERMII_API_KEY:latest
            --set-secrets=YOUVERIFY_API_KEY=YOUVERIFY_API_KEY:latest
            --set-secrets=SUPABASE_URL=SUPABASE_URL:latest
            --set-secrets=SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest
            --set-secrets=SUPABASE_STORAGE_BUCKET=SUPABASE_STORAGE_BUCKET:latest
            --set-secrets=SUPABASE_KYC_BUCKET=SUPABASE_KYC_BUCKET:latest
            --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
            --set-secrets=EMOJI_API_KEY=EMOJI_API_KEY:latest
            --set-secrets=AWS_REGION=AWS_REGION:latest
            --set-secrets=AWS_ACCESS_KEY_ID=AWS_ACCESS_KEY_ID:latest
            --set-secrets=AWS_SECRET_ACCESS_KEY=AWS_SECRET_ACCESS_KEY:latest
            --set-secrets=OTP_EXPIRY_MINUTES=OTP_EXPIRY_MINUTES:latest
            --set-secrets=JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest
            --set-secrets=SCHEDULER_SECRET=SCHEDULER_SECRET:latest
            --set-env-vars=NODE_ENV=production,SCHEDULER_ENABLED=false,COOKIE_SECURE=true
            
