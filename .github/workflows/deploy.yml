name: Deploy backend

on:
  push:
    branches:
      - staging
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}
      IMAGE_NAME: pliz-backend
      RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker auth
        run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      - name: Build image
        run: |
          docker build \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          flags: >-
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --port=8080
            --set-secrets=DATABASE_URL=DATABASE_URL:1
            --set-secrets=DIRECT_URL=DIRECT_URL:1
            --set-secrets=REDIS_URL=REDIS_URL:1
            --set-secrets=REDIS_HOST=REDIS_HOST:1
            --set-secrets=REDIS_PORT=REDIS_PORT:1
            --set-secrets=BASE_URL=BASE_URL:1
            --set-secrets=FRONTEND_URL=FRONTEND_URL:1
            --set-secrets=ALLOWED_ORIGINS=ALLOWED_ORIGINS:1
            --set-secrets=EMAIL_HOST=EMAIL_HOST:1
            --set-secrets=EMAIL_USER=EMAIL_USER:1
            --set-secrets=EMAIL_PASSWORD=EMAIL_PASSWORD:1
            --set-secrets=EMAIL_FROM=EMAIL_FROM:1
            --set-secrets=EMAIL_PORT=EMAIL_PORT:1
            --set-secret=EMAIL_TOKEN_EXPIRY_HOURS=EMAIL_TOKEN_EXPIRY_HOURS:1
            --set-secrets=CACHE_EMAIL_TOKEN_TTL=CACHE_EMAIL_TOKEN_TTL:1
            --set-secrets=CACHE_COUNTRIES_TTL=CACHE_COUNTRIES_TTL:1
            --set-secrets=CACHE_OTP_TTL=CACHE_OTP_TTL:1
            --set-secrets=CACHE_USER_SESSION_TTL=CACHE_USER_SESSION_TTL:1
            --set-secrets=RATE_LIMIT_MAX_REQUESTS=RATE_LIMIT_MAX_REQUESTS:1
            --set-secrets=RATE_LIMIT_WINDOW_MS=RATE_LIMIT_WINDOW_MS:1
            --set-secrets=PAYSTACK_SECRET_KEY=PAYSTACK_SECRET_KEY:1
            --set-secrets=PAYSTACK_PUBLIC_KEY=PAYSTACK_PUBLIC_KEY:1
            --set-secrets=JWT_SECRET=JWT_SECRET:1
            --set-secrets=JWT_ACCESS_EXPIRATION=JWT_ACCESS_EXPIRATION:1
            --set-secrets=JWT_REFRESH_EXPIRATION=JWT_REFRESH_EXPIRATION:1
            --set-secrets=NODE_ENV=NODE_ENV:1