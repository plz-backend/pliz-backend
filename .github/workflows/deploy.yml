name: Deploy backend

on:
  push:
    branches:
      - staging
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Production release tag to deploy
        required: true
        type: string

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: staging
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}
      IMAGE_NAME: pliz-backend
      IMAGE_TAG: staging-${{ github.sha }}
      APP_VERSION: staging-${{ github.sha }}
      RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ secrets.DEPLOYER_SERVICE_ACCOUNT }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
    steps:
      - uses: actions/checkout@v4

      - name: Print deployment context
        run: |
          echo "environment=staging"
          echo "image_tag=$IMAGE_TAG"
          echo "app_version=$APP_VERSION"

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        id: build
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME"
          docker build \
            --build-arg APP_VERSION="$APP_VERSION" \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t "$IMAGE:$IMAGE_TAG" \
            -t "$IMAGE:${{ github.sha }}" \
            .
          docker push "$IMAGE:$IMAGE_TAG"
          docker push "$IMAGE:${{ github.sha }}"
          IMAGE_DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE:$IMAGE_TAG")"
          echo "image_digest=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Scan staging image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.build.outputs.image_digest }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ steps.build.outputs.image_digest }}
          flags: >-
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --port=8080
            --allow-unauthenticated
            --set-secrets=DATABASE_URL=DATABASE_URL:latest
            --set-secrets=DIRECT_URL=DIRECT_URL:latest
            --set-secrets=REDIS_URL=REDIS_URL:latest
            --set-secrets=REDIS_HOST=REDIS_HOST:latest
            --set-secrets=REDIS_PORT=REDIS_PORT:latest
            --set-secrets=REDIS_PASSWORD=REDIS_PASSWORD:latest
            --set-secrets=REDIS_TLS=REDIS_TLS:latest
            --set-secrets=BASE_URL=BASE_URL:latest
            --set-secrets=FRONTEND_URL=FRONTEND_URL:latest
            --set-secrets=ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest
            --set-secrets=EMAIL_HOST=EMAIL_HOST:latest
            --set-secrets=EMAIL_USER=EMAIL_USER:latest
            --set-secrets=EMAIL_PASSWORD=EMAIL_PASSWORD:latest
            --set-secrets=EMAIL_FROM=EMAIL_FROM:latest
            --set-secrets=EMAIL_PORT=EMAIL_PORT:latest
            --set-secrets=EMAIL_TOKEN_EXPIRY_HOURS=EMAIL_TOKEN_EXPIRY_HOURS:latest
            --set-secrets=CACHE_EMAIL_TOKEN_TTL=CACHE_EMAIL_TOKEN_TTL:latest
            --set-secrets=CACHE_COUNTRIES_TTL=CACHE_COUNTRIES_TTL:latest
            --set-secrets=CACHE_OTP_TTL=CACHE_OTP_TTL:latest
            --set-secrets=CACHE_USER_SESSION_TTL=CACHE_USER_SESSION_TTL:latest
            --set-secrets=RATE_LIMIT_MAX_REQUESTS=RATE_LIMIT_MAX_REQUESTS:latest
            --set-secrets=RATE_LIMIT_WINDOW_MS=RATE_LIMIT_WINDOW_MS:latest
            --set-secrets=FLW_SECRET_KEY=FLW_SECRET_KEY:latest
            --set-secrets=FLW_WEBHOOK_HASH=FLW_WEBHOOK_HASH:latest
            --set-secrets=FLW_PUBLIC_KEY=FLW_PUBLIC_KEY:latest
            --set-secrets=JWT_SECRET=JWT_SECRET:latest
            --set-secrets=REFRESH_TOKEN_PEPPER=REFRESH_TOKEN_PEPPER:latest
            --set-secrets=DATA_ENCRYPTION_KEY=DATA_ENCRYPTION_KEY:latest
            --set-secrets=JWT_ACCESS_EXPIRATION=JWT_ACCESS_EXPIRATION:latest
            --set-secrets=JWT_REFRESH_EXPIRATION=JWT_REFRESH_EXPIRATION:latest
            --set-secrets=PREMBLY_API_KEY=PREMBLY_API_KEY:latest
            --set-secrets=PREMBLY_APP_ID=PREMBLY_APP_ID:latest
            --set-secrets=SENDCHAMP_API_KEY=SENDCHAMP_API_KEY:latest
            --set-secrets=SENDCHAMP_SMS_SENDER=SENDCHAMP_SMS_SENDER:latest
            --set-secrets=SENDCHAMP_WHATSAPP_SENDER=SENDCHAMP_WHATSAPP_SENDER:latest
            --set-secrets=TERMII_API_KEY=TERMII_API_KEY:latest
            --set-secrets=YOUVERIFY_API_KEY=YOUVERIFY_API_KEY:latest
            --set-secrets=SUPABASE_URL=SUPABASE_URL:latest
            --set-secrets=SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest
            --set-secrets=SUPABASE_STORAGE_BUCKET=SUPABASE_STORAGE_BUCKET:latest
            --set-secrets=SUPABASE_KYC_BUCKET=SUPABASE_KYC_BUCKET:latest
            --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
            --set-secrets=EMOJI_API_KEY=EMOJI_API_KEY:latest
            --set-secrets=AWS_REGION=AWS_REGION:latest
            --set-secrets=AWS_ACCESS_KEY_ID=AWS_ACCESS_KEY_ID:latest
            --set-secrets=AWS_SECRET_ACCESS_KEY=AWS_SECRET_ACCESS_KEY:latest
            --set-secrets=OTP_EXPIRY_MINUTES=OTP_EXPIRY_MINUTES:latest
            --set-secrets=JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest
            --set-secrets=SCHEDULER_SECRET=SCHEDULER_SECRET:latest
            --set-env-vars=NODE_ENV=production,SCHEDULER_ENABLED=false,COOKIE_SECURE=true

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_tag, 'v'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: production
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE }}
      IMAGE_NAME: pliz-backend
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      RUNTIME_SERVICE_ACCOUNT: ${{ vars.RUNTIME_SERVICE_ACCOUNT }}
      DEPLOYER_SERVICE_ACCOUNT: ${{ secrets.DEPLOYER_SERVICE_ACCOUNT }}
      WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Resolve release metadata
        id: meta
        run: |
          VERSION="${RELEASE_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          GIT_SHA="$(git rev-parse HEAD)"
          echo "git_sha=$GIT_SHA" >> "$GITHUB_OUTPUT"
          echo "Deploying production release $RELEASE_TAG (version $VERSION, sha $GIT_SHA)"

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          token_format: access_token
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install migration dependencies
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck production release
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: npx tsc --noEmit

      - name: Run production database migrations
        run: |
          DATABASE_URL="$(gcloud secrets versions access latest --secret=DATABASE_URL --impersonate-service-account="$RUNTIME_SERVICE_ACCOUNT")"
          DIRECT_URL="$(gcloud secrets versions access latest --secret=DIRECT_URL --impersonate-service-account="$RUNTIME_SERVICE_ACCOUNT")"

          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$DIRECT_URL"

          DATABASE_URL="$DATABASE_URL" DIRECT_URL="$DIRECT_URL" npx prisma migrate status
          DATABASE_URL="$DATABASE_URL" DIRECT_URL="$DIRECT_URL" npx prisma migrate deploy

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and push image
        id: build
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$GAR_REPOSITORY/$IMAGE_NAME"
          docker build \
            --build-arg APP_VERSION="${{ steps.meta.outputs.version }}" \
            --build-arg GIT_SHA="${{ steps.meta.outputs.git_sha }}" \
            -t "$IMAGE:${{ env.RELEASE_TAG }}" \
            -t "$IMAGE:${{ steps.meta.outputs.git_sha }}" \
            .
          docker push "$IMAGE:${{ env.RELEASE_TAG }}"
          docker push "$IMAGE:${{ steps.meta.outputs.git_sha }}"
          IMAGE_DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE:${{ env.RELEASE_TAG }}")"
          echo "image_digest=$IMAGE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: Scan production image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.build.outputs.image_digest }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ steps.build.outputs.image_digest }}
          flags: >-
            --service-account=${{ env.RUNTIME_SERVICE_ACCOUNT }}
            --port=8080
            --allow-unauthenticated
            --set-secrets=DATABASE_URL=DATABASE_URL:latest
            --set-secrets=DIRECT_URL=DIRECT_URL:latest
            --set-secrets=REDIS_URL=REDIS_URL:latest
            --set-secrets=REDIS_HOST=REDIS_HOST:latest
            --set-secrets=REDIS_PORT=REDIS_PORT:latest
            --set-secrets=REDIS_PASSWORD=REDIS_PASSWORD:latest
            --set-secrets=REDIS_TLS=REDIS_TLS:latest
            --set-secrets=BASE_URL=BASE_URL:latest
            --set-secrets=FRONTEND_URL=FRONTEND_URL:latest
            --set-secrets=ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest
            --set-secrets=EMAIL_HOST=EMAIL_HOST:latest
            --set-secrets=EMAIL_USER=EMAIL_USER:latest
            --set-secrets=EMAIL_PASSWORD=EMAIL_PASSWORD:latest
            --set-secrets=EMAIL_FROM=EMAIL_FROM:latest
            --set-secrets=EMAIL_PORT=EMAIL_PORT:latest
            --set-secrets=EMAIL_TOKEN_EXPIRY_HOURS=EMAIL_TOKEN_EXPIRY_HOURS:latest
            --set-secrets=CACHE_EMAIL_TOKEN_TTL=CACHE_EMAIL_TOKEN_TTL:latest
            --set-secrets=CACHE_COUNTRIES_TTL=CACHE_COUNTRIES_TTL:latest
            --set-secrets=CACHE_OTP_TTL=CACHE_OTP_TTL:latest
            --set-secrets=CACHE_USER_SESSION_TTL=CACHE_USER_SESSION_TTL:latest
            --set-secrets=RATE_LIMIT_MAX_REQUESTS=RATE_LIMIT_MAX_REQUESTS:latest
            --set-secrets=RATE_LIMIT_WINDOW_MS=RATE_LIMIT_WINDOW_MS:latest
            --set-secrets=FLW_SECRET_KEY=FLW_SECRET_KEY:latest
            --set-secrets=FLW_WEBHOOK_HASH=FLW_WEBHOOK_HASH:latest
            --set-secrets=FLW_PUBLIC_KEY=FLW_PUBLIC_KEY:latest
            --set-secrets=JWT_SECRET=JWT_SECRET:latest
            --set-secrets=REFRESH_TOKEN_PEPPER=REFRESH_TOKEN_PEPPER:latest
            --set-secrets=DATA_ENCRYPTION_KEY=DATA_ENCRYPTION_KEY:latest
            --set-secrets=JWT_ACCESS_EXPIRATION=JWT_ACCESS_EXPIRATION:latest
            --set-secrets=JWT_REFRESH_EXPIRATION=JWT_REFRESH_EXPIRATION:latest
            --set-secrets=PREMBLY_API_KEY=PREMBLY_API_KEY:latest
            --set-secrets=PREMBLY_APP_ID=PREMBLY_APP_ID:latest
            --set-secrets=SENDCHAMP_API_KEY=SENDCHAMP_API_KEY:latest
            --set-secrets=SENDCHAMP_SMS_SENDER=SENDCHAMP_SMS_SENDER:latest
            --set-secrets=SENDCHAMP_WHATSAPP_SENDER=SENDCHAMP_WHATSAPP_SENDER:latest
            --set-secrets=SUPABASE_URL=SUPABASE_URL:latest
            --set-secrets=SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest
            --set-secrets=SUPABASE_STORAGE_BUCKET=SUPABASE_STORAGE_BUCKET:latest
            --set-secrets=SUPABASE_KYC_BUCKET=SUPABASE_KYC_BUCKET:latest
            --set-secrets=EMOJI_API_KEY=EMOJI_API_KEY:latest
            --set-secrets=OTP_EXPIRY_MINUTES=OTP_EXPIRY_MINUTES:latest
            --set-secrets=JWT_REFRESH_SECRET=JWT_REFRESH_SECRET:latest
            --set-secrets=SCHEDULER_SECRET=SCHEDULER_SECRET:latest
            --set-env-vars=NODE_ENV=production,SCHEDULER_ENABLED=false,COOKIE_SECURE=true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
