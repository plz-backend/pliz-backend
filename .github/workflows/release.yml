name: Create release

# Bumps package.json, commits, tags vX.Y.Z on main, and pushes.
# The tag push triggers deploy-production in deploy.yml.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        run: npm version ${{ inputs.release_type }} -m "chore(release): %s"

      - name: Push release commit and tag
        run: git push origin main --follow-tags
