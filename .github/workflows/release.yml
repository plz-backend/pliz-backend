name: Create release

# Bumps package.json, commits, tags vX.Y.Z on main, pushes, and dispatches production deploy.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Semver bump
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        id: version
        run: |
          RELEASE_TAG="$(npm version "${{ inputs.release_type }}" -m "chore(release): %s")"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        run: git push origin main --follow-tags

      - name: Dispatch production deploy
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: gh workflow run deploy.yml --ref main -f release_tag="$RELEASE_TAG"
